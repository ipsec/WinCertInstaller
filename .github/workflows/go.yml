name: Go CI/CD

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        
    - name: Build
      run: |
        mkdir publish
        go build -ldflags="-s -w" -o ./publish/WinCertInstaller.exe main.go
      
    - name: Upload Artifact
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v4
      with:
        name: WinCertInstaller-Win64
        path: ./publish/WinCertInstaller.exe
        
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      run: |
        $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
        gh release create $tag ./publish/WinCertInstaller.exe --title "Release $tag" --notes "Automated Go release for version $tag"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
